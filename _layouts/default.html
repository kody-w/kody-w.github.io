<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <link rel="canonical" href="{{ page.url | prepend: site.url }}">
    <link href="/feed.xml" type="application/atom+xml" rel="alternate" title="{{ site.title }} posts" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <div>
      <a class="site-title" href="/">{{ site.title }}</a>
      <p class="site-subtitle">Full-Stack Developer · AI Agent Architect · Copilot Specialist</p>
    </div>
    <nav class="site-nav">
      <div class="trigger">
        <a class="page-link" href="/about/">About</a>
      </div>
    </nav>
  </div>
</header>

<div class="page-content">
  <div class="wrap">
    {{ content }}
  </div>
</div>

<footer class="site-footer">
  <div class="wrap">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
  </div>
</footer>

</body>
</html>
