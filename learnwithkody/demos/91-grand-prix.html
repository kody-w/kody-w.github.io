<canvas id="c"></canvas>
<div id="ui">
  <div id="lapBox">

<script>
"use strict";
(()=>{
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
const conCv=document.getElementById('confetti'),conCtx=conCv.getContext('2d');
const $=id=>document.getElementById(id);
const announcer=$('announcer'),lightsEl=$('lights'),lights=lightsEl.querySelectorAll('.light');
const podium=$('podium'),podStage=$('podiumStage'),podClass=$('podClassification'),mvpEl=$('mvp');
let W=0,H=0;
function resize(){W=cvs.width=conCv.width=innerWidth;H=cvs.height=conCv.height=innerHeight}
addEventListener('resize',resize);resize();

// =================== ROSTER ===================
// [shortname, fullname, team, primary, secondary, skill]
const ROSTER=[
 ['VANS','M. VANS','RED WING','#1E3A8A','#DC2626','aggressive'],
 ['PERZ','S. PERZ','RED WING','#1E3A8A','#FBBF24','cautious'],
 ['HAMM','L. HAMM','SILVERS','#00D2BE','#000000','clean'],
 ['RUSS','G. RUSS','SILVERS','#00D2BE','#FFFFFF','speedster'],
 ['LECC','C. LECC','SCARLET','#DC0000','#FBBF24','speedster'],
 ['SAIN','C. SAIN','SCARLET','#DC0000','#FFFFFF','clean'],
 ['NORS','L. NORS','PAPAYA','#FF8000','#000080','aggressive'],
 ['PIAS','O. PIAS','PAPAYA','#FF8000','#FFFFFF','clean'],
 ['ALON','F. ALON','EMERALD','#006F62','#10B981','aggressive'],
 ['STRO','L. STRO','EMERALD','#006F62','#FBBF24','cautious'],
 ['GASL','P. GASL','NAVY','#0090FF','#FF1493','speedster'],
 ['OCON','E. OCON','NAVY','#0090FF','#FFFFFF','cautious'],
 ['ALBO','A. ALBO','VIOLET','#6E00B8','#FFFFFF','clean'],
 ['SARG','L. SARG','VIOLET','#6E00B8','#FF0000','cautious'],
 ['HULK','N. HULK','SLATE','#9CA3AF','#000000','clean'],
 ['MAGN','K. MAGN','SLATE','#9CA3AF','#DC0000','aggressive'],
 ['BOTT','V. BOTT','SAFFRON','#00E700','#000000','speedster'],
 ['ZHOU','Z. ZHOU','SAFFRON','#00E700','#FFFFFF','clean'],
 ['RICC','D. RICC','TIDAL','#2B4562','#FF6B35','speedster'],
 ['TSUN','Y. TSUN','TIDAL','#2B4562','#FFFFFF','aggressive'],
 ['DRIFT','T. DRIFT','NIGHT','#1A1A1A','#FF00FF','aggressive'],
 ['STORM','R. STORM','FROST','#88DDFF','#003366','speedster'],
 ['MORS','P. MORS','FLAME','#FF3300','#FFD700','aggressive'],
 ['THUN','E. THUN','GHOST','#9CA3AF','#7A0099','clean']
];

const CIRCUIT_NAMES=['SILVERHAWK','MONTE NERA','SUZAKI','SPA-OREN','RED VALLEY','INTERAGOS','MARINA BAY','HAVENBROOK','PHOENIX RIDGE','NORDSCHLEIF','GULF SPRING','RIVIERA','BLACKWOOD','AUSTIN PASS','HOCKENBRINK','ZANDFEST','BAHRA','MUGELLO TWO','EMILIA-ROMA','ALBERT BAY'];

const LAPS=12;
const SAMPLES=620;
let track=null,cars=[],race=null,camera={x:0,y:0,zoom:0.55,tx:0,ty:0,tz:0.55};

// =================== TRACK GEN ===================
function makeTrack(){
 const N=10+(Math.random()*3|0);
 let pts=[];
 const bRX=620+Math.random()*120,bRY=400+Math.random()*100;
 for(let i=0;i<N;i++){
  const a=(i/N)*Math.PI*2;
  const rx=bRX+(Math.random()-.3)*180;
  const ry=bRY+(Math.random()-.3)*150;
  pts.push({x:Math.cos(a)*rx,y:Math.sin(a)*ry});
 }
 // Force a chicane: insert two staggered points
 const ci=2+(Math.random()*(N-4)|0);
 const p=pts[ci],pn=pts[(ci+1)%pts.length];
 const dx=pn.x-p.x,dy=pn.y-p.y;
 const pl=Math.hypot(dx,dy);
 const px=-dy/pl,py=dx/pl;
 pts.splice(ci+1,0,{x:p.x+dx*.4+px*70,y:p.y+dy*.4+py*70});
 pts.splice(ci+2,0,{x:p.x+dx*.6-px*70,y:p.y+dy*.6-py*70});

 // Catmull-Rom dense
 const M=pts.length,SEG=34,dense=[];
 for(let i=0;i<M;i++){
  const p0=pts[(i-1+M)%M],p1=pts[i],p2=pts[(i+1)%M],p3=pts[(i+2)%M];
  for(let s=0;s<SEG;s++){
   const t=s/SEG,tt=t*t,ttt=tt*t;
   const x=.5*(2*p1.x+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*tt+(-p0.x+3*p1.x-3*p2.x+p3.x)*ttt);
   const y=.5*(2*p1.y+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*tt+(-p0.y+3*p1.y-3*p2.y+p3.y)*ttt);
   dense.push({x,y});
  }
 }

 // Resample equal arc-length
 const arcs=[0];
 for(let i=1;i<dense.length;i++){
  const a=dense[i-1],b=dense[i];
  arcs.push(arcs[i-1]+Math.hypot(b.x-a.x,b.y-a.y));
 }
 const last=dense[dense.length-1],first=dense[0];
 const total=arcs[arcs.length-1]+Math.hypot(first.x-last.x,first.y-last.y);
 const step=total/SAMPLES;let path=[];
 let aIdx=0;
 for(let i=0;i<SAMPLES;i++){
  const tg=i*step;
  while(aIdx<arcs.length-1&&arcs[aIdx+1]<tg)aIdx++;
  const span=(arcs[aIdx+1]||arcs[aIdx])-arcs[aIdx]||1;
  const t=(tg-arcs[aIdx])/span;
  const a=dense[aIdx],b=dense[Math.min(aIdx+1,dense.length-1)];
  path.push({x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t});
 }

 // Tangents/normals
 for(let i=0;i<SAMPLES;i++){
  const a=path[(i-1+SAMPLES)%SAMPLES],b=path[(i+1)%SAMPLES];
  const tx=b.x-a.x,ty=b.y-a.y,tl=Math.hypot(tx,ty)||1;
  path[i].tx=tx/tl;path[i].ty=ty/tl;
  path[i].nx=-path[i].ty;path[i].ny=path[i].tx;
 }
 // Curvature (angle change per sample)
 for(let i=0;i<SAMPLES;i++){
  const a=path[i],b=path[(i+1)%SAMPLES];
  let d=a.tx*b.tx+a.ty*b.ty;d=Math.max(-1,Math.min(1,d));
  a.curv=Math.acos(d);
 }
 // Smooth curvature
 const SC=new Array(SAMPLES);
 const w=4;
 for(let i=0;i<SAMPLES;i++){
  let s=0;
  for(let k=-w;k<=w;k++)s+=path[(i+k+SAMPLES)%SAMPLES].curv;
  SC[i]=s/(w*2+1);
 }
 for(let i=0;i<SAMPLES;i++)path[i].curv=SC[i];
 // Max speed from curvature
 const baseTop=225;
 for(let i=0;i<SAMPLES;i++){
  const c=path[i].curv;
  path[i].maxSpeed=Math.max(50,Math.min(baseTop,baseTop/(1+c*30)));
 }
 // Apply lookahead so cars brake before corners
 const look=14;
 const ls=new Array(SAMPLES);
 for(let i=0;i<SAMPLES;i++){
  let m=path[i].maxSpeed;
  for(let k=1;k<look;k++){
   const j=(i+k)%SAMPLES;
   const need=path[j].maxSpeed+k*5.0;
   if(need<m)m=need;
  }
  ls[i]=m;
 }
 for(let i=0;i<SAMPLES;i++)path[i].maxSpeed=ls[i];

 // Find longest straight for start/finish & pit lane
 const straights=[];
 let runStart=-1,runLen=0;
 for(let i=0;i<SAMPLES*2;i++){
  const idx=i%SAMPLES;
  if(path[idx].curv<.022){
   if(runStart<0)runStart=idx;
   runLen++;
  }else{
   if(runLen>20)straights.push({start:runStart,len:runLen});
   runStart=-1;runLen=0;
  }
  if(i===SAMPLES-1&&runLen>20)straights.push({start:runStart,len:runLen});
 }
 straights.sort((a,b)=>b.len-a.len);
 if(straights.length<1)straights.push({start:0,len:50});
 const main=straights[0];
 const startIdxRaw=(main.start+Math.floor(main.len*.55))%SAMPLES;

 // Inside direction (toward centroid)
 let cx=0,cy=0;
 for(const p of path){cx+=p.x;cy+=p.y}
 cx/=path.length;cy/=path.length;
 const psp=path[startIdxRaw];
 const insideSign=Math.sign((cx-psp.x)*psp.nx+(cy-psp.y)*psp.ny);

 // Pit lane indices on UNROTATED path
 const pitSign=-insideSign;
 const pitOff=28;
 const pitEntryRaw=(main.start+Math.floor(main.len*.10))%SAMPLES;
 const pitExitL=Math.min(main.len-2,Math.floor(main.len*.92));
 const pitExitRaw=(main.start+pitExitL)%SAMPLES;

 // ROTATE PATH so startIdx becomes index 0 (lap detection wraps at sample 0)
 const rot=startIdxRaw;
 const rotated=new Array(SAMPLES);
 for(let i=0;i<SAMPLES;i++)rotated[i]=path[(i+rot)%SAMPLES];
 path=rotated;
 const startIdx=0;
 const pitEntry=(pitEntryRaw-rot+SAMPLES)%SAMPLES;
 const pitExit=(pitExitRaw-rot+SAMPLES)%SAMPLES;
 // Translate straights for DRS zone computation (rotated indices)
 const rotStraights=straights.map(s=>({start:(s.start-rot+SAMPLES)%SAMPLES,len:s.len}));

 // Build pit path (parallel offset on rotated path between pitEntry and pitExit)
 const pitLen=(pitExit-pitEntry+SAMPLES)%SAMPLES;
 const pitPath=[];
 for(let i=0;i<=pitLen;i++){
  const idx=(pitEntry+i)%SAMPLES;
  const p=path[idx];
  const t=i/pitLen;
  let off=pitOff;
  if(t<.18)off=pitOff*(t/.18);
  else if(t>.82)off=pitOff*((1-t)/.18);
  pitPath.push({x:p.x+p.nx*off*pitSign,y:p.y+p.ny*off*pitSign,mainIdx:idx,t});
 }
 const pitBoxIdx=Math.floor(pitPath.length*.5);
 // pitFinishIdx: index in pitPath where mainIdx===0 (the start/finish line projection)
 let pitFinishIdx=-1;
 for(let i=0;i<pitPath.length;i++){
  if(pitPath[i].mainIdx===0){pitFinishIdx=i;break}
 }

 // DRS zones from rotated straights
 const drsZones=[];
 for(let i=0;i<Math.min(3,rotStraights.length);i++){
  const s=rotStraights[i];
  const ds=(s.start+Math.floor(s.len*.25))%SAMPLES;
  const de=(s.start+Math.floor(s.len*.92))%SAMPLES;
  drsZones.push({start:ds,end:de});
 }
 for(let i=0;i<SAMPLES;i++){
  path[i].drs=false;
  for(const z of drsZones){
   const inZ=z.start<=z.end?(i>=z.start&&i<=z.end):(i>=z.start||i<=z.end);
   if(inZ){path[i].drs=true;break}
  }
 }
 // Bounding box for camera
 let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;
 for(const p of path){if(p.x<mnx)mnx=p.x;if(p.y<mny)mny=p.y;if(p.x>mxx)mxx=p.x;if(p.y>mxy)mxy=p.y}
 const distPerIdx=total/SAMPLES;
 return {path,startIdx,pitPath,pitEntry,pitExit,pitBoxIdx,pitFinishIdx,drsZones,total,samples:SAMPLES,distPerIdx,bbox:{mnx,mny,mxx,mxy},insideSign,pitSign,name:CIRCUIT_NAMES[Math.random()*CIRCUIT_NAMES.length|0],straights:rotStraights};
}

// =================== CARS / RACE ===================
function pickLineup(){
 const arr=[...ROSTER];
 // Fisher-Yates
 for(let i=arr.length-1;i>0;i--){const j=Math.random()*(i+1)|0;const t=arr[i];arr[i]=arr[j];arr[j]=t}
 return arr.slice(0,8).map((d,i)=>({id:i,short:d[0],name:d[1],team:d[2],primary:d[3],secondary:d[4],skill:d[5]}));
}
function pitLapForSkill(s){
 if(s==='aggressive')return 4+(Math.random()*2|0); // 4-5
 if(s==='speedster')return 5+(Math.random()*2|0);  // 5-6
 if(s==='clean')return 6+(Math.random()*3|0);      // 6-8
 return 7+(Math.random()*3|0);                     // cautious 7-9
}
function spawnCars(track,lineup){
 const out=[];
 for(let i=0;i<8;i++){
  const driver=lineup[i];
  const offset=4+i*2.5;
  const gridS=(track.startIdx-offset+track.samples)%track.samples;
  const lat=(i%2===0)?-4.6:4.6;
  out.push({
   idx:i,driver,
   s:gridS,lap:0,speed:0,
   lateral:lat,targetLateral:lat,
   tireWear:0,
   pitLap:pitLapForSkill(driver.skill),
   pitDone:false,onPitPath:false,pitPathS:0,pitBoxStop:false,pitBoxTimer:0,
   drsActive:false,drafting:false,
   spinTimer:0,offTrack:false,
   bestLap:Infinity,lastLapStart:0,lapTimes:[],
   finished:false,finishOrder:0,finishTime:0,
   x:0,y:0,heading:0,
   prevRank:i,rank:i,
   battling:false,
   passes:0,
   throttle:0,brake:0,
   paceVar:0.97+Math.random()*0.06, // per-car pace variance ±3%
  });
 }
 // Initial render position
 for(const c of out){
  const i0=Math.floor(c.s)%track.samples;
  const p=track.path[i0];
  c.x=p.x+p.nx*c.lateral;c.y=p.y+p.ny*c.lateral;
  c.heading=Math.atan2(p.ty,p.tx);
 }
 return out;
}

function newRace(){
 track=makeTrack();
 const lineup=pickLineup();
 cars=spawnCars(track,lineup);
 prevRanking=[];
 overtakeCooldown.clear();
 // Initial camera centered on grid
 const g=track.path[track.startIdx];
 camera.x=g.x;camera.y=g.y;camera.tx=g.x;camera.ty=g.y;camera.zoom=0.55;camera.tz=0.55;
 race={
  state:'pre',time:0,lightCount:0,lightsTimer:0,raceStart:0,
  finishOrder:[],
  fastestLap:{time:Infinity,driver:null,lap:0},
  magicLap:null,
  safetyCar:false,sgcTimer:0,sgcStartLap:0,sgcUsed:false,
  events:[],bannerStack:[],
  firstBlood:false,polePos:lineup[0],
  crashCount:0,
  podiumTimer:0,confetti:[]
 };
 setLap(0);
 $('circuitName').textContent='— '+track.name+' CIRCUIT —';
 $('posRows').innerHTML='';
 $('otList').innerHTML='';
 $('fastestLap').style.display='none';
 podium.style.display='none';
 lightsEl.style.display='none';
 banner('FORMATION LAP',2,'green');
}

function setLap(n){$('lapVal').textContent=Math.min(LAPS,Math.max(0,n))+' / '+LAPS}

function banner(text,duration=2.5,color=''){
 race.bannerStack.push({text,t:duration,color});
}
function tickBanner(dt){
 if(race.bannerStack.length===0){announcer.classList.remove('show');return}
 const b=race.bannerStack[0];
 b.t-=dt;
 if(b.t<=0){race.bannerStack.shift();announcer.classList.remove('show');return}
 announcer.textContent=b.text;
 announcer.className='show'+(b.color?' '+b.color:'');
}

// =================== AI / PHYSICS ===================
function carsByRank(){
 const arr=cars.slice();
 arr.sort((a,b)=>{
  if(a.finished&&b.finished)return a.finishOrder-b.finishOrder;
  if(a.finished)return -1;
  if(b.finished)return 1;
  const aT=a.lap*track.samples+a.s;
  const bT=b.lap*track.samples+b.s;
  return bT-aT;
 });
 return arr;
}

function findCarAhead(car){
 // Returns nearest car ahead in same lap-ish, by totalProgress
 const myT=car.lap*track.samples+car.s;
 let best=null,bestGap=Infinity;
 for(const o of cars){
  if(o===car||o.finished)continue;
  const oT=o.lap*track.samples+o.s;
  let gap=oT-myT;
  if(gap<=0)continue;
  if(gap>track.samples*.5)continue;
  if(gap<bestGap){bestGap=gap;best=o}
 }
 if(!best)return null;
 return {car:best,gap:bestGap};
}
function findCarBehind(car){
 const myT=car.lap*track.samples+car.s;
 let best=null,bestGap=Infinity;
 for(const o of cars){
  if(o===car||o.finished)continue;
  const oT=o.lap*track.samples+o.s;
  let gap=myT-oT;
  if(gap<=0)continue;
  if(gap>track.samples*.5)continue;
  if(gap<bestGap){bestGap=gap;best=o}
 }
 if(!best)return null;
 return {car:best,gap:bestGap};
}

function decideLateral(car){
 // Look ahead for next corner direction; aim for apex on inside
 const idx=Math.floor(car.s)%track.samples;
 // Avg signed curvature ahead -> determine corner side
 let look=20,signedSum=0;
 for(let k=2;k<look;k++){
  const i=(idx+k)%track.samples;
  const a=track.path[i],b=track.path[(i+1)%track.samples];
  // signed curv via cross product of tangents
  const cross=a.tx*b.ty-a.ty*b.tx;
  signedSum+=cross;
 }
 const cornerSide=Math.sign(signedSum); // negative: right, positive: left in track frame
 let racingLine=cornerSide*-3.5; // outside-apex-outside: target inside at apex; midcorner approx -3
 // Slight wobble per skill
 const sk=car.driver.skill;
 if(sk==='clean')racingLine*=1.0;
 else if(sk==='speedster')racingLine*=1.05;
 else if(sk==='aggressive')racingLine*=0.92;
 else racingLine*=0.95;

 // Battling logic: if behind another car within 12 units and similar lateral, take alternative line
 const ahead=findCarAhead(car);
 let target=racingLine;
 if(ahead&&ahead.gap<14){
  const a=ahead.car;
  if(Math.abs(a.lateral-target)<3.5){
   // Try other side
   target=-racingLine*0.7;
  }
 }
 // Defensive: if rival close behind on a straight & DRS, defend by moving toward inside
 const beh=findCarBehind(car);
 const idxP=track.path[idx];
 if(beh&&beh.gap<10&&idxP.curv<.03){
  const b=beh.car;
  if(b.drsActive){
   target=-cornerSide*3.0; // defend inside
  }
 }
 // If on pit path: don't override
 if(car.onPitPath)return;
 // Off track recover
 if(Math.abs(car.lateral)>8.6){
  target=Math.sign(car.lateral)*-1; // pull back
 }
 car.targetLateral=Math.max(-7.5,Math.min(7.5,target));
}

const ACCEL=72,BRAKE=130;

function updateCar(car,dt){
 if(car.finished)return;
 if(car.spinTimer>0){
  car.spinTimer-=dt;
  car.speed*=Math.pow(0.4,dt);
  // small jitter heading
  return;
 }
 // Pre-race: cars don't move
 if(race.state==='pre'){
  car.speed=0;return;
 }

 const idx=Math.floor(car.s)%track.samples;
 const p=track.path[idx];
 // Base target from path max speed
 let targetSpeed=p.maxSpeed;
 // Skill speed scaling
 const sk=car.driver.skill;
 const skillMul=sk==='speedster'?1.04:sk==='aggressive'?1.025:sk==='cautious'?0.965:1.0;
 targetSpeed*=skillMul*car.paceVar;
 // Tire wear
 const wearPenalty=1-car.tireWear*0.30;
 targetSpeed*=wearPenalty;
 // Off track penalty
 if(Math.abs(car.lateral)>8.4){
  targetSpeed*=0.55;car.offTrack=true;
  car.tireWear+=dt*0.012; // grass eats tires
 }else{car.offTrack=false}
 // Drafting
 const ahead=findCarAhead(car);
 car.drafting=false;
 car.drsActive=false;
 if(ahead){
  const a=ahead.car;
  const samelat=Math.abs(a.lateral-car.lateral)<5.5;
  if(ahead.gap<10&&samelat){
   targetSpeed*=1.05;car.drafting=true;
  }
  // DRS in zone, within ~1s of car ahead (gap_units <80)
  if(p.drs&&ahead.gap<22&&race.state==='race'){
   targetSpeed*=1.10;car.drsActive=true;
  }
 }
 // Safety car bunching
 if(race.safetyCar){
  targetSpeed=Math.min(targetSpeed,72);
  // Force gap not to widen: if too far back, close up
  if(ahead&&ahead.gap>16)targetSpeed=Math.min(110,targetSpeed*1.15);
 }
 // Pit lane speed limit
 if(car.onPitPath){
  targetSpeed=Math.min(targetSpeed,38);
 }
 if(car.pitBoxStop){targetSpeed=0}

 // Approach
 if(car.speed<targetSpeed){
  car.speed=Math.min(targetSpeed,car.speed+ACCEL*dt);
  car.throttle=1;car.brake=0;
 }else{
  const oldS=car.speed;
  car.speed=Math.max(targetSpeed,car.speed-BRAKE*dt);
  car.throttle=0;car.brake=oldS-car.speed>0.5?1:0;
 }

 // Mistake chance
 const mistakeBase=sk==='aggressive'?0.00018:sk==='speedster'?0.00010:sk==='cautious'?0.00005:0.00007;
 if(Math.random()<mistakeBase+car.tireWear*0.0003){
  // Lockup
  car.speed*=0.55;
  car.lateral+=(Math.random()-0.5)*5;
 }
 // Spin if cornering force exceeds grip with worn tires
 const curv=p.curv;
 const reqGrip=car.speed*car.speed*curv*0.0010;
 const maxGrip=5.6*(1-car.tireWear*0.45);
 if(reqGrip>maxGrip*1.55&&Math.random()<0.0035){
  car.spinTimer=0.7+Math.random()*0.6;
  race.crashCount++;
  // Maybe trigger safety car (rare)
  if(!race.sgcUsed&&race.safetyCar===false&&car.lap>=2&&Math.random()<0.45){
   triggerSafetyCar();
  }
 }

 // Move along
 const distMove=car.speed*dt;
 const dIdx=distMove/track.distPerIdx;
 if(car.onPitPath){
  // pit path uses pitPathS index
  car.pitPathS+=dIdx;
  // Pit box: if reached pitBox and not yet stopped, stop
  if(!car.pitBoxStop&&!car.pitDone&&car.pitPathS>=track.pitBoxIdx&&car.pitPathS<track.pitBoxIdx+1.5){
   car.pitBoxStop=true;car.pitBoxTimer=2.5;car.speed=0;
  }
  if(car.pitBoxStop){
   car.pitBoxTimer-=dt;
   if(car.pitBoxTimer<=0){
    car.pitBoxStop=false;car.pitDone=true;car.tireWear=0;
    pushOT(`<span class="verb">${car.driver.short}</span> in for fresh rubber, rejoining`);
   }
  }
  // Check if crossed lap line on pit lane
  if(track.pitFinishIdx>=0){
   if(!car._lappedInPit&&car.pitPathS>=track.pitFinishIdx&&car.pitPathS<=track.pitFinishIdx+2){
    car._lappedInPit=true;
    completeLap(car);
   }
  }
  // End of pit
  if(car.pitPathS>=track.pitPath.length-1){
   car.onPitPath=false;
   car.s=track.pitExit;
   car._lappedInPit=false;
   car.lateral=track.pitSign*-3.5; // rejoin near racing line
  }
 }else{
  car.s+=dIdx;
  if(car.s>=track.samples){
   car.s-=track.samples;
   completeLap(car);
  }
 }

 // Tire wear ~7% per lap target. Approx lap time 30s. So per second 0.07/30 ≈ 0.0023
 car.tireWear+=dt*0.0023*(sk==='aggressive'?1.15:sk==='cautious'?0.85:1.0);
 if(car.tireWear>0.95)car.tireWear=0.95;

 // Pit decision: when crossing pitEntry on pitLap
 if(!car.pitDone&&!car.onPitPath&&!car.finished&&car.lap===car.pitLap){
  // Detect crossing pitEntry: previous s<pitEntry, current s>=pitEntry. Tricky with wrap.
  const pe=track.pitEntry;
  const sNow=Math.floor(car.s);
  if(sNow===pe||sNow===(pe+1)%track.samples){
   car.onPitPath=true;car.pitPathS=0;car._lappedInPit=false;
  }
 }

 // Lateral target & smooth
 decideLateral(car);
 const latRate=Math.min(1,5.5*dt);
 car.lateral+=(car.targetLateral-car.lateral)*latRate;

 // Soft collisions: rear car slows if too close at same lateral
 if(ahead&&!ahead.car.onPitPath&&!car.onPitPath){
  const a=ahead.car;
  if(ahead.gap<3.2&&Math.abs(a.lateral-car.lateral)<2.5){
   car.speed*=Math.pow(0.5,dt*4);
   car.lateral+=(car.lateral-a.lateral)*0.1;
   // Push apart
   car.targetLateral+=Math.sign(car.lateral-a.lateral)*0.5;
  }
 }

 // Render position
 if(car.onPitPath){
  const i=Math.floor(car.pitPathS);
  const pa=track.pitPath[Math.max(0,Math.min(track.pitPath.length-1,i))];
  const pb=track.pitPath[Math.max(0,Math.min(track.pitPath.length-1,i+1))];
  car.x=pa.x;car.y=pa.y;
  car.heading=Math.atan2(pb.y-pa.y,pb.x-pa.x);
 }else{
  const i0=Math.floor(car.s)%track.samples;
  const p0=track.path[i0];
  car.x=p0.x+p0.nx*car.lateral;
  car.y=p0.y+p0.ny*car.lateral;
  car.heading=Math.atan2(p0.ty,p0.tx);
 }
}

function completeLap(car){
 car.lap++;
 const lapT=race.time-car.lastLapStart;
 car.lastLapStart=race.time;
 if(car.lap>=2){
  car.lapTimes.push(lapT);
  if(lapT<car.bestLap)car.bestLap=lapT;
  if(lapT<race.fastestLap.time){
   const wasMagic=car.tireWear>0.50;
   race.fastestLap={time:lapT,driver:car.driver,lap:car.lap,magic:wasMagic};
   updateFastestLap();
   if(wasMagic){
    race.magicLap={driver:car.driver,time:lapT,lap:car.lap};
    banner('MAGIC LAP — '+car.driver.short+' '+fmtTime(lapT),3.2,'purple');
   }else{
    banner('FASTEST LAP — '+car.driver.short+' '+fmtTime(lapT),2.6,'purple');
   }
  }
 }
 if(car.lap>=LAPS){
  car.finished=true;
  race.finishOrder.push(car);
  car.finishOrder=race.finishOrder.length;
  car.finishTime=race.time;
  if(race.finishOrder.length===1){
   banner('CHEQUERED FLAG',5,'gold');
  }
 }
 // Final lap banner
 const ldr=carsByRank()[0];
 if(ldr&&ldr.lap===LAPS-1&&!race.finalLapShown){
  race.finalLapShown=true;
  banner('FINAL LAP',3.2,'gold');
 }
}

function fmtTime(t){
 if(!isFinite(t))return '—:—';
 const m=Math.floor(t/60),s=t-m*60;
 return m+':'+s.toFixed(2).padStart(5,'0');
}
function fmtGap(t){
 if(!isFinite(t))return '—';
 if(t<60)return '+'+t.toFixed(2);
 const m=Math.floor(t/60),s=t-m*60;
 return '+'+m+':'+s.toFixed(1).padStart(4,'0');
}

function triggerSafetyCar(){
 if(race.sgcUsed||race.state!=='race')return;
 race.sgcUsed=true;race.safetyCar=true;
 race.sgcStartLap=carsByRank()[0].lap;
 banner('SAFETY CAR DEPLOYED',3.5);
 pushOT(`<span class="verb">SAFETY CAR</span> on track`,'first');
}

// =================== EVENT FEED ===================
function pushOT(html,cls=''){
 const list=$('otList');
 const div=document.createElement('div');
 div.className='otRow'+(cls?' '+cls:'');
 div.innerHTML=html;
 list.insertBefore(div,list.firstChild);
 while(list.children.length>6)list.removeChild(list.lastChild);
}

let prevRanking=[];
const overtakeCooldown=new Map();
function detectOvertakes(){
 const ranked=carsByRank();
 for(let i=0;i<ranked.length;i++)ranked[i].rank=i;
 if(prevRanking.length===ranked.length){
  // Compare adjacent swaps
  for(let i=0;i<ranked.length-1;i++){
   const cur=ranked[i],nxt=ranked[i+1];
   if(prevRanking[i]===nxt&&prevRanking[i+1]===cur){
    // overtake: cur passed nxt
    if(cur.finished||nxt.finished)continue;
    // Hysteresis: ignore if same pair just swapped recently
    const k=cur.idx<nxt.idx?cur.idx+'-'+nxt.idx:nxt.idx+'-'+cur.idx;
    const cd=overtakeCooldown.get(k)||0;
    if(race.time<cd)continue;
    overtakeCooldown.set(k,race.time+4.0);
    const lap=cur.lap+1;
    const drsTxt=cur.drsActive?' with DRS':'';
    pushOT(`<span class="verb">${cur.driver.short}</span> passed ${nxt.driver.short} for <span class="pos">P${i+1}</span> on lap ${lap}${drsTxt}`,
      cur.drsActive?'drs':'');
    cur.passes++;
    if(i===0&&!race.firstBlood){
     race.firstBlood=true;
     banner('FIRST BLOOD — LEADER PASS',3.5,'gold');
    }
   }
  }
 }
 prevRanking=ranked.slice();
}

// =================== UI: POSITION TABLE ===================
function updatePositions(){
 const ranked=carsByRank();
 const rowsEl=$('posRows');
 const leader=ranked[0];
 const leaderTotal=leader.lap*track.samples+leader.s;
 // Build/update rows
 if(rowsEl.children.length!==8){
  rowsEl.innerHTML='';
  for(let i=0;i<8;i++){
   const r=document.createElement('div');
   r.className='posRow';
   r.innerHTML=`<div class="num"></div><div class="colorChip"></div><div class="name"></div><div class="gap"></div><div class="pIcon">P</div><div class="tireBar"><div class="tireFill"></div></div>`;
   rowsEl.appendChild(r);
  }
 }
 for(let i=0;i<8;i++){
  const c=ranked[i];
  const row=rowsEl.children[i];
  row.classList.toggle('leader',i===0);
  // Battling: this car or below within 8 units
  let battling=false;
  if(i<7){
   const me=c.lap*track.samples+c.s;
   const next=ranked[i+1];
   const nx=next.lap*track.samples+next.s;
   if((me-nx)*track.distPerIdx<60)battling=true;
  }
  row.classList.toggle('battling',battling);
  row.children[0].textContent=i+1;
  row.children[1].style.background=c.driver.primary;
  row.children[2].textContent=c.driver.short;
  row.children[2].style.color=c.driver.primary==='#1A1A1A'?'#fff':'#fff';
  // Gap
  let gapText='';
  if(i===0){
   gapText=c.finished?'FIN':'LEADER';
  }else{
   if(c.finished){
    gapText=fmtGap(c.finishTime-leader.finishTime);
   }else{
    const myT=c.lap*track.samples+c.s;
    const dIdx=leaderTotal-myT;
    const dist=dIdx*track.distPerIdx;
    const sec=dist/Math.max(60,leader.speed);
    gapText=fmtGap(sec);
   }
  }
  row.children[3].textContent=gapText;
  // Pit icon
  const pIcon=row.children[4];
  pIcon.textContent=c.pitDone?'P':'·';
  pIcon.classList.toggle('no',!c.pitDone);
  // Tire bar
  const tireFill=row.children[5].firstChild;
  tireFill.style.width=Math.round((1-c.tireWear)*100)+'%';
 }
}

function updateFastestLap(){
 const fl=$('fastestLap');
 if(!race.fastestLap.driver){fl.style.display='none';return}
 fl.style.display='block';
 fl.classList.toggle('magic',race.fastestLap.magic);
 fl.innerHTML='⚡ FASTEST LAP <b>'+race.fastestLap.driver.short+'</b> '+fmtTime(race.fastestLap.time)+(race.fastestLap.magic?' <span style="color:#400">MAGIC</span>':'');
}

// =================== RENDERING ===================
function render(){
 ctx.fillStyle='#1a3014';
 ctx.fillRect(0,0,W,H);
 // Decorative grass texture (sparse spots)
 ctx.save();
 // Camera transform
 const z=camera.zoom;
 ctx.translate(W/2,H/2);
 ctx.scale(z,z);
 ctx.translate(-camera.x,-camera.y);

 drawTrack();
 drawDraftLines();
 drawCars();

 ctx.restore();

 drawLeaderTag();
}

function buildTrackEdges(){
 if(track._edgeCache)return track._edgeCache;
 const w=10;
 const inner=[],outer=[];
 for(let i=0;i<track.samples;i++){
  const p=track.path[i];
  inner.push({x:p.x+p.nx*w,y:p.y+p.ny*w});
  outer.push({x:p.x-p.nx*w,y:p.y-p.ny*w});
 }
 track._edgeCache={inner,outer};
 return track._edgeCache;
}

function drawTrack(){
 const e=buildTrackEdges();
 // Asphalt fill: outer polygon minus inner — easier: draw thick stroke
 ctx.lineWidth=20;ctx.strokeStyle='#222';
 ctx.beginPath();
 for(let i=0;i<track.samples;i++){
  const p=track.path[i];
  if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
 }
 ctx.closePath();ctx.stroke();
 // Track surface
 ctx.lineWidth=18;ctx.strokeStyle='#333a40';
 ctx.stroke();
 // Painted racing line (faint)
 ctx.lineWidth=1.2;ctx.strokeStyle='rgba(220,30,30,.18)';
 ctx.beginPath();
 for(let i=0;i<track.samples;i++){
  const p=track.path[i];
  // approx racing line: midpoint
  const a=track.path[(i-3+track.samples)%track.samples];
  const b=track.path[(i+3)%track.samples];
  const cross=a.tx*b.ty-a.ty*b.tx;
  const off=Math.sign(cross)*-3.0;
  const x=p.x+p.nx*off,y=p.y+p.ny*off;
  if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
 }
 ctx.closePath();ctx.stroke();

 // Kerbs: red/white striped at corners (where curv high)
 const kerbW=4;
 for(let i=0;i<track.samples;i+=2){
  const p=track.path[i];
  if(p.curv>0.04){
   const a=track.path[(i+1)%track.samples];
   const cross=p.tx*a.ty-p.ty*a.tx;
   const side=Math.sign(cross)*-1; // outer side gets kerb
   ctx.fillStyle=(i%6<3)?'#d33':'#eee';
   const cx=p.x+p.nx*9*side,cy=p.y+p.ny*9*side;
   ctx.save();
   ctx.translate(cx,cy);
   ctx.rotate(Math.atan2(p.ty,p.tx));
   ctx.fillRect(-2.5,-kerbW/2,5,kerbW);
   ctx.restore();
  }
 }

 // DRS zone markers (green stripes along track edge)
 for(const z of track.drsZones){
  ctx.strokeStyle='rgba(50,220,80,.45)';ctx.lineWidth=2;
  ctx.beginPath();
  let i=z.start;
  let first=true;
  while(true){
   const p=track.path[i];
   const x=p.x+p.nx*8.5*track.insideSign,y=p.y+p.ny*8.5*track.insideSign;
   if(first){ctx.moveTo(x,y);first=false}else ctx.lineTo(x,y);
   if(i===z.end)break;
   i=(i+1)%track.samples;
  }
  ctx.stroke();
  // Label
  const mid=Math.floor(((z.start+z.end)/2)%track.samples);
  const mp=track.path[mid];
  ctx.save();
  ctx.translate(mp.x+mp.nx*22*track.insideSign,mp.y+mp.ny*22*track.insideSign);
  ctx.fillStyle='rgba(50,220,80,.85)';
  ctx.font='bold 11px Consolas';
  ctx.textAlign='center';
  ctx.fillText('DRS',0,0);
  ctx.restore();
 }

 // Pit lane: separate ribbon
 ctx.lineWidth=10;ctx.strokeStyle='#252a30';
 ctx.beginPath();
 for(let i=0;i<track.pitPath.length;i++){
  const p=track.pitPath[i];
  if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
 }
 ctx.stroke();
 ctx.lineWidth=8;ctx.strokeStyle='#3a3f44';
 ctx.stroke();
 // Pit lane white separator line
 ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,.4)';
 ctx.setLineDash([5,3]);
 ctx.beginPath();
 for(let i=0;i<track.pitPath.length;i++){
  const p=track.pitPath[i];
  if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
 }
 ctx.stroke();
 ctx.setLineDash([]);
 // Pit boxes — small marks
 const pb=track.pitPath[track.pitBoxIdx];
 ctx.fillStyle='#fff';
 ctx.font='bold 10px Consolas';
 ctx.fillText('PIT',pb.x,pb.y-12);

 // Start/finish line: chequered
 const sp=track.path[track.startIdx];
 ctx.save();
 ctx.translate(sp.x,sp.y);
 ctx.rotate(Math.atan2(sp.ty,sp.tx));
 const tw=10;
 for(let k=-tw;k<tw;k++){
  ctx.fillStyle=(k+tw)%2===0?'#fff':'#000';
  ctx.fillRect(-1.5,k,3,1);
 }
 ctx.restore();
}

function drawDraftLines(){
 ctx.strokeStyle='rgba(255,160,40,.45)';
 ctx.lineWidth=1.5;
 for(const c of cars){
  if(!c.drafting||c.finished||c.spinTimer>0)continue;
  const ahead=findCarAhead(c);
  if(!ahead)continue;
  const a=ahead.car;
  ctx.beginPath();
  ctx.moveTo(c.x,c.y);
  ctx.lineTo(a.x,a.y);
  ctx.stroke();
 }
 // DRS extra glow
 ctx.strokeStyle='rgba(50,220,80,.6)';
 ctx.lineWidth=2;
 for(const c of cars){
  if(!c.drsActive||c.finished||c.spinTimer>0)continue;
  ctx.beginPath();
  ctx.arc(c.x,c.y,5.5,0,Math.PI*2);
  ctx.stroke();
 }
}

function drawCars(){
 // Sort so leader is on top
 const sorted=carsByRank().slice().reverse();
 for(const c of sorted){
  ctx.save();
  ctx.translate(c.x,c.y);
  ctx.rotate(c.heading);
  // Spin shake
  if(c.spinTimer>0){
   ctx.rotate((Math.sin(race.time*30)*0.6));
  }
  // Body chevron shape
  ctx.fillStyle=c.driver.primary;
  ctx.beginPath();
  ctx.moveTo(4.5,0);
  ctx.lineTo(-3,-2.6);
  ctx.lineTo(-2,0);
  ctx.lineTo(-3,2.6);
  ctx.closePath();
  ctx.fill();
  // Secondary stripe
  ctx.fillStyle=c.driver.secondary;
  ctx.beginPath();
  ctx.moveTo(4.2,0);
  ctx.lineTo(-1.5,-1);
  ctx.lineTo(-1.5,1);
  ctx.closePath();
  ctx.fill();
  // White outline
  ctx.strokeStyle='rgba(255,255,255,.5)';
  ctx.lineWidth=0.4;
  ctx.beginPath();
  ctx.moveTo(4.5,0);
  ctx.lineTo(-3,-2.6);
  ctx.lineTo(-2,0);
  ctx.lineTo(-3,2.6);
  ctx.closePath();
  ctx.stroke();
  // Brake glow
  if(c.brake>0){
   ctx.fillStyle='rgba(255,40,40,.85)';
   ctx.fillRect(-3.1,-2.4,0.6,1);
   ctx.fillRect(-3.1,1.4,0.6,1);
  }
  // Tire wear hint: dim color slightly when tireWear high
  // (skip for perf)
  ctx.restore();
 }
}

function drawLeaderTag(){
 const ranked=carsByRank();
 const ld=ranked[0];
 if(!ld||race.state==='pre')return;
 // Project leader to screen
 const z=camera.zoom;
 const sx=W/2+(ld.x-camera.x)*z;
 const sy=H/2+(ld.y-camera.y)*z;
 if(sx<0||sx>W||sy<0||sy>H)return;
 ctx.save();
 ctx.font='bold 11px Consolas';
 ctx.textAlign='center';
 const w=ctx.measureText(ld.driver.short).width+18;
 ctx.fillStyle='rgba(0,0,0,.78)';
 ctx.fillRect(sx-w/2,sy-26,w,16);
 ctx.fillStyle=ld.driver.primary;
 ctx.fillRect(sx-w/2,sy-26,3,16);
 ctx.fillStyle='#fff';
 ctx.fillText('P1 '+ld.driver.short,sx,sy-14);
 ctx.restore();
}

// =================== CAMERA ===================
function updateCamera(dt){
 const ranked=carsByRank();
 const ld=ranked[0];
 if(!ld)return;
 // Aim at leader, but ease toward nearest battle if very close
 let tx=ld.x,ty=ld.y;
 // If gap to P2 is tight, center between them
 if(ranked[1]){
  const me=ld.lap*track.samples+ld.s;
  const ot=ranked[1].lap*track.samples+ranked[1].s;
  const gap=(me-ot)*track.distPerIdx;
  if(gap<35&&!ranked[1].finished){
   tx=(ld.x+ranked[1].x)/2;
   ty=(ld.y+ranked[1].y)/2;
  }
 }
 // Track bbox aware zoom
 const bw=Math.max(W,H);
 const trackW=track.bbox.mxx-track.bbox.mnx;
 const trackH=track.bbox.mxy-track.bbox.mny;
 const fitZoom=0.42*Math.min(W/trackW,H/trackH);
 // Default zoom: closer (~0.55), zoom out when leader far from camera or during safety car
 let tz=0.7;
 if(race.safetyCar)tz=Math.max(fitZoom*0.85,0.42);
 if(race.state==='pre')tz=Math.max(fitZoom*0.95,0.5);
 if(race.state==='cooldown')tz=Math.max(fitZoom*0.9,0.5);

 camera.tx=tx;camera.ty=ty;camera.tz=tz;
 const k=Math.min(1,4*dt);
 camera.x+=(camera.tx-camera.x)*k;
 camera.y+=(camera.ty-camera.y)*k;
 camera.zoom+=(camera.tz-camera.zoom)*Math.min(1,2*dt);
}

// =================== STATE MACHINE ===================
function runPreRace(dt){
 // Show 5 lights, each turning on every 0.7s, then all off → GO
 race.lightsTimer-=dt;
 if(race.lightsTimer<=0){
  if(race.lightCount<5){
   lightsEl.style.display='flex';
   lights[race.lightCount].classList.add('on');
   race.lightCount++;
   race.lightsTimer=0.7+Math.random()*0.4;
  }else if(race.lightCount===5){
   // Hold then lights out
   race.lightsTimer=0.6+Math.random()*0.7;
   race.lightCount=6;
  }else if(race.lightCount===6){
   for(const l of lights)l.classList.remove('on');
   lightsEl.style.display='none';
   banner('LIGHTS OUT!',2.4,'green');
   race.state='race';race.raceStart=race.time;
   for(const c of cars)c.lastLapStart=race.time;
   race.lightCount=7;
  }
 }
}

function runRace(dt){
 race.time+=dt;
 // Random safety-car trigger
 if(!race.sgcUsed&&race.state==='race'&&race.time>20){
  // 0.2% per frame chance, very rare
  if(Math.random()<0.00018&&carsByRank()[0].lap>=2){
   triggerSafetyCar();
  }
 }
 // Safety car end: 1 lap after start
 if(race.safetyCar){
  const ld=carsByRank()[0];
  if(ld.lap>race.sgcStartLap){
   race.safetyCar=false;
   banner('SAFETY CAR IN — RESTART',3,'green');
  }
 }
 for(const c of cars)updateCar(c,dt);
 detectOvertakes();
 updatePositions();
 // Update lap counter
 const ld=carsByRank()[0];
 setLap(Math.min(LAPS,ld.lap+(ld.finished?0:1)));
 // Check race end
 if(race.finishOrder.length===8){
  race.state='cooldown';race.podiumTimer=4;
  // Publish full results
 }else if(race.finishOrder.length>=3&&!race._podiumScheduled){
  race._podiumScheduled=true;
 }
}

function runCooldown(dt){
 race.time+=dt;
 race.podiumTimer-=dt;
 // Cars keep moving (cooldown lap) for some seconds
 for(const c of cars){
  if(!c.finished)updateCar(c,dt);
  else{
   c.speed*=Math.pow(0.5,dt);
   // Move slowly around track for cooldown
   const dIdx=c.speed*dt/track.distPerIdx;
   c.s+=dIdx;
   if(c.s>=track.samples)c.s-=track.samples;
   const i0=Math.floor(c.s)%track.samples;
   const p0=track.path[i0];
   c.x=p0.x+p0.nx*c.lateral;c.y=p0.y+p0.ny*c.lateral;
   c.heading=Math.atan2(p0.ty,p0.tx);
  }
 }
 if(race.podiumTimer<=0){
  showPodium();
  race.state='podium';race.podiumTimer=8.5;
 }
}

// =================== PODIUM ===================
function showPodium(){
 const ranked=carsByRank();
 // Build podium stage
 podStage.innerHTML='';
 const order=[2,1,3]; // P2, P1, P3 visually
 for(const pos of order){
  const c=ranked[pos-1];
  if(!c)continue;
  const div=document.createElement('div');
  div.className='podBlock p'+pos;
  div.innerHTML=`<div class="podPos">${pos}</div><div class="podName">${c.driver.short}</div><div class="podTeam">${c.driver.team}</div><div class="podColor" style="background:${c.driver.primary}"></div>`;
  podStage.appendChild(div);
 }
 // Classification table
 let html='<h2>FINAL CLASSIFICATION</h2><div class="sub">'+track.name+' GRAND PRIX // '+LAPS+' LAPS</div>';
 const flDriver=race.fastestLap.driver;
 const winnerTime=ranked[0].finishTime;
 for(let i=0;i<8;i++){
  const c=ranked[i];
  const isFL=flDriver&&c.driver.short===flDriver.short;
  const flag=isFL?(race.fastestLap.magic?'MAGIC':'FL'):'';
  let gap='';
  if(i===0)gap=fmtTime(c.finishTime);
  else if(c.finished)gap=fmtGap(c.finishTime-winnerTime);
  else gap='DNF';
  html+=`<div class="classRow${isFL?' fl':''}">
   <div class="cnum">${i+1}</div>
   <div class="ccol" style="background:${c.driver.primary}"></div>
   <div class="cname">${c.driver.name}</div>
   <div class="cteam">${c.driver.team}</div>
   <div class="cgap">${gap}</div>
   <div class="cflag">${flag}</div>
  </div>`;
 }
 podClass.innerHTML=html;
 // MVP text
 const w=ranked[0];
 mvpEl.textContent=`MVP — ${w.driver.name} // ${w.driver.team}`;
 podium.style.display='block';
 // Spawn confetti
 race.confetti=[];
 for(let i=0;i<240;i++){
  race.confetti.push({
   x:Math.random()*W,y:-20-Math.random()*200,
   vx:(Math.random()-0.5)*60,vy:30+Math.random()*120,
   c:['#ffd700','#ff4040','#40a0ff','#40ff60','#ff80ff','#ffffff'][Math.random()*6|0],
   r:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*8,
   sz:3+Math.random()*4
  });
 }
 banner('PODIUM CEREMONY',2.5,'gold');
}

function tickConfetti(dt){
 conCtx.clearRect(0,0,W,H);
 if(race.confetti.length===0)return;
 for(const p of race.confetti){
  p.vy+=80*dt;
  p.x+=p.vx*dt;p.y+=p.vy*dt;p.r+=p.vr*dt;
  if(p.y>H+30){
   p.y=-30;p.x=Math.random()*W;p.vy=20+Math.random()*80;
  }
  conCtx.save();
  conCtx.translate(p.x,p.y);
  conCtx.rotate(p.r);
  conCtx.fillStyle=p.c;
  conCtx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);
  conCtx.restore();
 }
}

function runPodium(dt){
 race.podiumTimer-=dt;
 tickConfetti(dt);
 if(race.podiumTimer<=0){
  // auto rematch
  newRace();
  // start new pre-race light sequence
  race.state='pre';race.lightCount=0;race.lightsTimer=1.6;
  setLap(0);
 }
}

// =================== MAIN LOOP ===================
let last=performance.now();
function loop(now){
 const dt=Math.min(0.05,(now-last)/1000);
 last=now;
 if(race.state==='pre'){
  race.time+=dt;
  runPreRace(dt);
  for(const c of cars)updateCar(c,dt);
  updatePositions();
 }else if(race.state==='race'){
  runRace(dt);
 }else if(race.state==='cooldown'){
  runCooldown(dt);
  updatePositions();
 }else if(race.state==='podium'){
  runPodium(dt);
 }
 tickBanner(dt);
 updateCamera(dt);
 render();
 requestAnimationFrame(loop);
}

// =================== INIT ===================
newRace();
// Pre-race lights start
race.state='pre';race.lightCount=0;race.lightsTimer=1.4;
requestAnimationFrame(loop);

})();
</script>
